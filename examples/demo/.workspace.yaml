name: demo

services:
  api:
    command: >
      while true; do
        echo "[api] running on port $PORT — $(date '+%H:%M:%S')";
        sleep 3;
      done
    port: 4000

  web:
    command: >
      while true; do
        echo "[web] running on port $PORT — $(date '+%H:%M:%S')";
        sleep 2;
      done
    port: 3000
    dependsOn: [api]

agentTemplates:
  dev:
    command: claude
    description: "dev session"
