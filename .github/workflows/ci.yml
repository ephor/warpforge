name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-v3-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust daemon and protocol
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    env:
      CARGO_BUILD_JOBS: "2"
      CARGO_PROFILE_TEST_DEBUG: "0"
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: root
          cache-on-failure: true
      - name: Install Linux portal dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libwayland-dev lld
      - run: cargo fmt --all --check
      - name: Build Rust tests
        run: cargo test --locked --no-run
        timeout-minutes: 15
      - name: Run Rust tests
        run: cargo test --locked
        timeout-minutes: 5
      - run: cargo clippy --locked --all-targets -- -D warnings

  desktop-web:
    name: Desktop web
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test
      - run: bun run build

  desktop-rust:
    name: Desktop Rust
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          shared-key: desktop-linux
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libappindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwayland-dev \
            libwebkit2gtk-4.1-dev \
            patchelf
      - run: bun desktop/scripts/stage-sidecar.mjs --profile debug
      - run: cargo check --locked --manifest-path desktop/src-tauri/Cargo.toml
